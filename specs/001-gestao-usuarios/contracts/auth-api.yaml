openapi: 3.0.3
info:
  title: API de Autenticação e Usuários
  description: Endpoints para autenticação e gestão de usuários do Sistema de Gerenciamento de Estoque
  version: 1.0.0
  contact:
    name: Equipe de Desenvolvimento

servers:
  - url: /api
    description: Servidor local
  - url: http://localhost:3000/api
    description: Desenvolvimento

tags:
  - name: Auth
    description: Endpoints de autenticação
  - name: Users
    description: Endpoints de gestão de usuários

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Cadastrar novo usuário
      description: Permite ao administrador cadastrar um novo usuário no sistema
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: usuario@exemplo.com
              password: Senha123@
              name: Nome do Usuário
              role: OPERATOR
      responses:
        '201':
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Email já cadastrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login de usuário
      description: Autentica o usuário e retorna tokens JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: admin@estoque.local
              password: Admin@123
      responses:
        '200':
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout de usuário
      description: Invalida o token de refresh do usuário
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout realizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logout realizado com sucesso

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      description: Usa o refresh token para obter novo access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Tokens renovados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Solicitar recuperação de senha
      description: Gera token para recuperação de senha. V1 via console log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: usuario@exemplo.com
      responses:
        '200':
          description: Token gerado - V1 via console log
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Instruções enviadas para o email

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Redefinir senha
      description: Redefine a senha usando token de recuperação
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
            example:
              token: abc123-token
              newPassword: NovaSenha123@
      responses:
        '200':
          description: Senha alterada
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Senha alterada com sucesso
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users:
    get:
      tags: [Users]
      summary: Listar usuários
      description: Retorna lista paginada de usuários (apenas Admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/Role'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserStatus'
      responses:
        '200':
          description: Lista de usuários
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserResponse'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Acesso negado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}:
    get:
      tags: [Users]
      summary: Detalhar usuário
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      tags: [Users]
      summary: Editar usuário
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Usuário atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Não pode editar a si mesmo ou último admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Users]
      summary: Desativar usuário
      description: Soft delete - altera status para INACTIVE
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Usuário desativado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Usuário desativado com sucesso
        '400':
          description: Não pode desativar a si mesmo ou último admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT obtido via /auth/login

  parameters:
    Id:
      name: id
      in: path
      required: true
      description: ID do usuário (MongoDB ObjectId)
      schema:
        type: string
        example: 65f1a2b3c4d5e6f7g8h9i0j1

    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1

    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  schemas:
    Role:
      type: string
      enum: [ADMIN, MANAGER, OPERATOR]
      description: Papel do usuário no sistema
      example: OPERATOR

    UserStatus:
      type: string
      enum: [ACTIVE, INACTIVE]
      description: Status do usuário
      example: ACTIVE

    RegisterRequest:
      type: object
      required: [email, password, name, role]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          description: Email único do usuário
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: Senha (mínimo 8 caracteres)
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Nome completo do usuário
        role:
          $ref: '#/components/schemas/Role'

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT token de acesso (expira em 1 hora)
        refreshToken:
          type: string
          description: Token para renovação (expira em 7 dias)
        expiresIn:
          type: integer
          description: Tempo de expiração em segundos
        user:
          $ref: '#/components/schemas/UserResponse'

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          description: Token de recuperação
        newPassword:
          type: string
          minLength: 8
          maxLength: 128

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        role:
          $ref: '#/components/schemas/Role'
        status:
          $ref: '#/components/schemas/UserStatus'

    UserResponse:
      type: object
      properties:
        id:
          type: string
          description: ID único (MongoDB ObjectId)
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        status:
          $ref: '#/components/schemas/UserStatus'
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    Error:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: Mensagem de erro
        error:
          type: string
          example: Bad Request

  responses:
    BadRequest:
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 400
            message: Email inválido
            error: Bad Request

    Unauthorized:
      description: Não autenticado ou token inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 401
            message: Token inválido ou expirado
            error: Unauthorized
